<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alquimia | Portal Visceral</title>
    
    <!-- Identidade Visual -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pombagiras/melusine/main/Al%C3%AA%20(3)%20(3)%20(1).png">
    <meta name="theme-color" content="#030303">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --dark: #030303;
            --blood: #8b0000;
            --metal: #1a1a1a;
            --ghost: #d0d0d0;
        }

        body {
            background-color: var(--dark);
            color: var(--ghost);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid var(--blood);
            width: 100%;
            letter-spacing: 5px;
        }

        .container {
            width: 95%;
            max-width: 500px;
            margin: 20px auto;
        }

        /* Accordion */
        .accordion {
            background-color: var(--metal);
            color: var(--ghost);
            cursor: pointer;
            padding: 20px;
            width: 100%;
            border: 1px solid #333;
            text-align: left;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .accordion.active {
            border-left: 6px solid var(--blood);
            background-color: #0a0a0a;
        }

        .panel {
            padding: 0 15px;
            background-color: #050505;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            border: 1px solid #111;
            margin-bottom: 10px;
        }

        /* Inputs e Preview */
        .drop-zone {
            height: 100px;
            border: 1px dashed var(--blood);
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #666;
            font-size: 0.8rem;
        }

        input[type="text"] {
            width: 100%;
            background: #000;
            border: 1px solid var(--blood);
            color: #fff;
            padding: 15px;
            box-sizing: border-box;
            margin: 10px 0;
        }

        #previewContainer {
            position: relative;
            margin: 15px 0;
            display: none;
            border: 1px solid var(--blood);
        }

        #previewImg { width: 100%; display: block; }

        .overlay-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 2px 2px 10px #000;
            font-family: 'Georgia', serif;
            pointer-events: none;
        }

        /* Botões */
        .btn-ritual {
            width: 100%;
            padding: 22px;
            background-color: var(--blood);
            color: #fff;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin: 10px 0;
        }

        #downloadBtn {
            display: none;
            background-color: #222;
            border: 1px solid var(--ghost);
        }

        #status {
            font-size: 0.75rem;
            text-align: center;
            margin: 10px 0;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <h1>ALQUIMIA</h1>
</header>

<div class="container">
    
    <button class="accordion"><span>01</span> Matéria-Prima <span>+</span></button>
    <div class="panel">
        <div class="drop-zone" onclick="document.getElementById('fileIn').click()">
            [ TOQUE PARA SELECIONAR IMAGEM ]
            <input type="file" id="fileIn" hidden accept="image/*">
        </div>
    </div>

    <button class="accordion"><span>02</span> Sopro Vital <span>+</span></button>
    <div class="panel">
        <input type="text" id="msgInput" placeholder="A frase que habita o abismo..." oninput="updatePreviewText()">
        <div id="previewContainer">
            <img id="previewImg" src="">
            <div class="overlay-text" id="overlay"></div>
        </div>
    </div>

    <button class="accordion"><span>03</span> Ritual Final <span>+</span></button>
    <div class="panel">
        <button class="btn-ritual" id="processBtn" onclick="executeRitual()">Comprimir e Gravar Frase</button>
        <div id="status">Aguardando transmutação...</div>
        <button class="btn-ritual" id="downloadBtn">Baixar Imagem Pronta</button>
    </div>

</div>

<script>
    // Configuração Supabase
    const _supabase = supabase.createClient('https://rbygxkbewzknvjjhxdvw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJieWd4a2Jld3prbnZqamh4ZHZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYwMDcxNjQsImV4cCI6MjA4MTU4MzE2NH0.YrHF9HEGo6yv9MyNsPzFgBhaAB1DRh2SLU8f7L6s1nY');

    // Accordion Logic
    document.querySelectorAll('.accordion').forEach(button => {
        button.onclick = () => {
            button.classList.toggle('active');
            let panel = button.nextElementSibling;
            panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
            if (navigator.vibrate) navigator.vibrate(30);
        }
    });

    // Preview Logic
    const fileIn = document.getElementById('fileIn');
    fileIn.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = document.getElementById('previewImg');
                img.src = event.target.result;
                document.getElementById('previewContainer').style.display = 'block';
                // Update panel height
                const panel = document.getElementById('previewContainer').parentElement;
                panel.style.maxHeight = panel.scrollHeight + "px";
            };
            reader.readAsDataURL(file);
        }
    };

    function updatePreviewText() {
        document.getElementById('overlay').innerText = document.getElementById('msgInput').value;
    }

    // O Ritual: Fusão, Compressão e Upload
    async function executeRitual() {
        const file = fileIn.files[0];
        const msg = document.getElementById('msgInput').value;
        const status = document.getElementById('status');

        if (!file) return alert("Selecione uma imagem.");
        
        status.innerText = "Transmutando pixels...";
        if (navigator.vibrate) navigator.vibrate([50, 20, 50]);

        const img = new Image();
        img.src = document.getElementById('previewImg').src;
        
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // 1. Redimensionar para compressão (máximo 1200px)
            const maxWidth = 1200;
            const scale = Math.min(1, maxWidth / img.width);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;

            // 2. Desenhar imagem base
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            // 3. Gravar texto nos pixels de forma harmônica
            const fontSize = canvas.width * 0.07; 
            ctx.font = `bold ${fontSize}px Georgia`;
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // Sombra para legibilidade
            ctx.shadowColor = "black";
            ctx.shadowBlur = 15;
            ctx.lineWidth = 4;
            ctx.strokeText(msg, canvas.width / 2, canvas.height / 2);
            ctx.fillText(msg, canvas.width / 2, canvas.height / 2);

            // 4. Transformar em Blob (JPEG com 60% de qualidade)
            canvas.toBlob(async (blob) => {
                const fileName = `visceral_${Date.now()}.jpg`;
                status.innerText = "Enviando ao Supabase...";

                // Upload para o Storage
                const { data: upData, error: upErr } = await _supabase.storage
                    .from('alquimia-imagens')
                    .upload(fileName, blob, { contentType: 'image/jpeg' });

                if (upErr) {
                    status.innerText = "Erro: " + upErr.message;
                    return;
                }

                // URL Pública
                const { data: { publicUrl } } = _supabase.storage
                    .from('alquimia-imagens')
                    .getPublicUrl(fileName);

                // Gravar na Tabela
                await _supabase.from('historico_visceral').insert([{
                    url_imagem: publicUrl,
                    mensagem_texto: msg,
                    tamanho_original: file.size,
                    tamanho_final: blob.size
                }]);

                // Finalização
                status.innerHTML = `<b style="color:#00ff00">RITUAL COMPLETO!</b><br>
                                    Original: ${(file.size/1024).toFixed(0)}KB | Final: ${(blob.size/1024).toFixed(0)}KB`;
                
                const dlBtn = document.getElementById('downloadBtn');
                dlBtn.style.display = "block";
                dlBtn.onclick = () => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = "alquimia_visceral.jpg";
                    link.click();
                };
            }, 'image/jpeg', 0.6);
        };
    }
</script>

</body>
</html>
